name: Workflow

on:
push:
branches:
- main

permissions:
id-token: write
contents: read

jobs:

integration:
name: Continuous Integration
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirement.txt

  - name: Build Docker Image
    run: |
      docker build -t credit-card-fraud .
```

deployment:
name: Continuous Deployment
needs: integration
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}

  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build, Tag and Push Docker Image
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: credit-card-fraud
      IMAGE_TAG: latest

    run: |
      docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
      docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  - name: Deploy to EC2
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USERNAME }}
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        docker stop fraud_container || true
        docker rm fraud_container || true

        docker pull ${{ secrets.ECR_REGISTRY }}/credit-card-fraud:latest

        docker run -d \
          --name fraud_container \
          -p 5000:5000 \
          ${{ secrets.ECR_REGISTRY }}/credit-card-fraud:latest
```
